<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asteroids Neon - Samuel Tech Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 12px;
            width: 100%;
        }

        canvas {
            border: 3px solid #00d4ff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            background: #000000;
            width: 100%;
            height: auto;
            max-width: 900px;
            touch-action: none;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px solid #00d4ff;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
        }

        .info-item {
            text-align: center;
            flex: 1;
        }

        .info-label {
            font-size: 11px;
            color: #00d4ff;
            letter-spacing: 2px;
        }

        .info-value {
            font-size: 24px;
            color: #ffcc00;
            font-weight: bold;
        }

        .lives {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .heart {
            font-size: 20px;
        }

        /* Controles Touch */
        .touch-controls {
            display: none;
            gap: 12px;
            margin-top: 8px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .touch-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            border-radius: 60px;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #00d4ff;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: #00d4ff;
            color: #000;
            transform: scale(0.92);
        }

        .shoot-btn {
            background: rgba(255, 0, 100, 0.2);
            border-color: #ff0066;
            color: #ff0066;
        }

        .shoot-btn:active {
            background: #ff0066;
            color: #000;
        }

        .restart-btn {
            background: rgba(0, 255, 100, 0.2);
            border-color: #00ff66;
            color: #00ff66;
            width: auto;
            padding: 0 20px;
            font-size: 16px;
        }

        /* Telas */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .overlay-box {
            background: linear-gradient(135deg, #0a0a0f, #001a1a);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #00d4ff;
            max-width: 90%;
            width: 350px;
        }

        .overlay-box h1 {
            color: #00d4ff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay-box button {
            background: linear-gradient(135deg, #00d4ff, #0088ff);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin: 10px;
            font-family: monospace;
        }

        .controls-info {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .touch-controls {
                display: flex;
            }
            .touch-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
            .info-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Tela Inicial -->
    <div id="startScreen" class="overlay">
        <div class="overlay-box">
            <h1>⚡ ASTEROIDS NEON ⚡</h1>
            <p style="color: #00d4ff; margin-bottom: 20px;">Destrua os asteroides!</p>
            <button onclick="startGame()">🚀 INICIAR</button>
            <div class="controls-info">
                💻 PC: ← → ↑ + ESPAÇO | 📱 Celular: Botões na tela
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameOverScreen" class="overlay" style="display: none;">
        <div class="overlay-box">
            <h1 style="color: #ff0066;">💀 GAME OVER 💀</h1>
            <p style="font-size: 28px; margin: 20px; color: #ffcc00;" id="finalScore">0</p>
            <p>Nível: <strong id="finalLevel">1</strong></p>
            <button onclick="restartGame()">🔄 JOGAR</button>
        </div>
    </div>

    <div class="game-container">
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">🎯 PONTOS</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">⭐ NÍVEL</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">❤️ VIDAS</div>
                <div class="info-value lives" id="livesDisplay">❤️ ❤️ ❤️</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="900" height="600"></canvas>

        <!-- Botões Touch -->
        <div class="touch-controls">
            <div class="touch-btn" id="rotateLeftBtn">◀</div>
            <div class="touch-btn" id="rotateRightBtn">▶</div>
            <div class="touch-btn" id="accelerateBtn">▲</div>
            <div class="touch-btn shoot-btn" id="shootBtn">💥</div>
            <div class="touch-btn restart-btn" id="restartTouchBtn">🔄</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Variáveis
        let gameRunning = false;
        let animationId = null;
        let score = 0;
        let level = 1;
        let lives = 3;

        // Nave
        let ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            angle: 0,
            vx: 0,
            vy: 0,
            radius: 14,
            invincible: 0
        };

        let asteroids = [];
        let bullets = [];
        let particles = [];
        let shootCooldown = 0;
        const SHOOT_DELAY = 10;

        let asteroidSpeed = 1.5;
        let asteroidCount = 4;

        // Controles
        let keyLeft = false, keyRight = false, keyUp = false;
        let touchLeft = false, touchRight = false, touchAccel = false;

        // ========== FUNÇÕES ==========
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            const hearts = document.getElementById('livesDisplay');
            hearts.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                hearts.innerHTML += '<span class="heart">❤️</span>';
            }
        }

        // Asteroide
        class Asteroid {
            constructor(x, y, size, vx, vy) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = size || Math.random() * 35 + 20;
                this.radius = this.size / 2;
                this.vx = vx || (Math.random() - 0.5) * asteroidSpeed * 2;
                this.vy = vy || (Math.random() - 0.5) * asteroidSpeed * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                
                this.vertices = [];
                for (let i = 0; i < 10; i++) {
                    const a = (i / 10) * Math.PI * 2;
                    const r = this.radius * (0.6 + Math.random() * 0.8);
                    this.vertices.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff6600';
                ctx.strokeStyle = '#ff8800';
                ctx.fillStyle = 'rgba(255, 100, 0, 0.2)';
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.rotSpeed;
                
                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }

            split() {
                if (this.size > 30) {
                    const newSize = this.size / 1.5;
                    const ang1 = Math.atan2(this.vy, this.vx) + Math.PI / 4;
                    const ang2 = Math.atan2(this.vy, this.vx) - Math.PI / 4;
                    const spd = Math.hypot(this.vx, this.vy);
                    return [
                        new Asteroid(this.x, this.y, newSize, Math.cos(ang1) * spd * 0.8, Math.sin(ang1) * spd * 0.8),
                        new Asteroid(this.x, this.y, newSize, Math.cos(ang2) * spd * 0.8, Math.sin(ang2) * spd * 0.8)
                    ];
                }
                return [];
            }
        }

        // Partícula
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 100, 0, ${this.life})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function initGame() {
            ship = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                angle: 0,
                vx: 0,
                vy: 0,
                radius: 14,
                invincible: 0
            };
            asteroids = [];
            bullets = [];
            particles = [];
            score = 0;
            level = 1;
            lives = 3;
            shootCooldown = 0;
            asteroidSpeed = 1.5;
            
            updateUI();
            spawnAsteroids();
        }

        function spawnAsteroids() {
            asteroidCount = Math.min(4 + Math.floor(level / 2), 10);
            asteroidSpeed = 1.5 + (level - 1) * 0.3;
            
            for (let i = 0; i < asteroidCount; i++) {
                let ast;
                let safe = false;
                while (!safe) {
                    ast = new Asteroid();
                    const dx = ast.x - ship.x;
                    const dy = ast.y - ship.y;
                    if (Math.hypot(dx, dy) > 100) safe = true;
                }
                asteroids.push(ast);
            }
        }

        function shoot() {
            if (shootCooldown > 0) return;
            bullets.push({
                x: ship.x + Math.cos(ship.angle) * ship.radius,
                y: ship.y + Math.sin(ship.angle) * ship.radius,
                vx: ship.vx + Math.cos(ship.angle) * 9,
                vy: ship.vy + Math.sin(ship.angle) * 9,
                life: 100
            });
            shootCooldown = SHOOT_DELAY;
        }

        function checkCollisions() {
            // Nave vs Asteroides
            for (let i = 0; i < asteroids.length; i++) {
                const a = asteroids[i];
                const dx = ship.x - a.x;
                const dy = ship.y - a.y;
                if (Math.hypot(dx, dy) < ship.radius + a.radius && ship.invincible <= 0) {
                    lives--;
                    updateUI();
                    
                    for (let j = 0; j < 15; j++) particles.push(new Particle(ship.x, ship.y));
                    
                    if (lives <= 0) {
                        gameOver();
                        return false;
                    }
                    
                    ship.x = canvas.width / 2;
                    ship.y = canvas.height / 2;
                    ship.vx = 0;
                    ship.vy = 0;
                    ship.invincible = 60;
                    asteroids.splice(i, 1);
                    break;
                }
            }
            
            if (ship.invincible > 0) ship.invincible--;
            
            // Tiros vs Asteroides
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                let hit = false;
                
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const a = asteroids[j];
                    if (Math.hypot(b.x - a.x, b.y - a.y) < a.radius) {
                        const newAst = a.split();
                        asteroids.splice(j, 1, ...newAst);
                        score += 10;
                        updateUI();
                        
                        for (let k = 0; k < 10; k++) particles.push(new Particle(a.x, a.y));
                        
                        const newLevel = Math.floor(score / 50) + 1;
                        if (newLevel > level) {
                            level = newLevel;
                            updateUI();
                            asteroidSpeed = 1.5 + (level - 1) * 0.3;
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) bullets.splice(i, 1);
            }
            return true;
        }

        // Desenho
        function drawStars() {
            if (!window.starsData) {
                window.starsData = [];
                for (let i = 0; i < 150; i++) {
                    window.starsData.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2,
                        alpha: Math.random() * 0.7
                    });
                }
            }
            for (const s of window.starsData) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
        }

        function drawShip() {
            if (ship.invincible > 0 && Math.floor(Date.now() / 50) % 3 === 0) return;
            
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(-12, -9);
            ctx.lineTo(-6, 0);
            ctx.lineTo(-12, 9);
            ctx.closePath();
            ctx.fillStyle = '#00ffff';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            if (keyUp || touchAccel) {
                ctx.beginPath();
                ctx.moveTo(-10, 0);
                ctx.lineTo(-20, -6);
                ctx.lineTo(-20, 6);
                ctx.fillStyle = '#ff6600';
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawBullets() {
            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffff00';
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffff00';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Update
        function updateGame() {
            if (!gameRunning) return;
            
            if (shootCooldown > 0) shootCooldown--;
            
            // Teclado
            if (keyLeft) ship.angle -= 0.09;
            if (keyRight) ship.angle += 0.09;
            if (keyUp) {
                ship.vx += Math.cos(ship.angle) * 0.28;
                ship.vy += Math.sin(ship.angle) * 0.28;
                const maxSpeed = 7.5;
                if (Math.abs(ship.vx) > maxSpeed) ship.vx = Math.sign(ship.vx) * maxSpeed;
                if (Math.abs(ship.vy) > maxSpeed) ship.vy = Math.sign(ship.vy) * maxSpeed;
            }
            
            // Touch
            if (touchLeft) ship.angle -= 0.09;
            if (touchRight) ship.angle += 0.09;
            if (touchAccel) {
                ship.vx += Math.cos(ship.angle) * 0.28;
                ship.vy += Math.sin(ship.angle) * 0.28;
                const maxSpeed = 7.5;
                if (Math.abs(ship.vx) > maxSpeed) ship.vx = Math.sign(ship.vx) * maxSpeed;
                if (Math.abs(ship.vy) > maxSpeed) ship.vy = Math.sign(ship.vy) * maxSpeed;
            }
            
            ship.vx *= 0.99;
            ship.vy *= 0.99;
            ship.x += ship.vx;
            ship.y += ship.vy;
            
            if (ship.x < 0) ship.x = canvas.width;
            if (ship.x > canvas.width) ship.x = 0;
            if (ship.y < 0) ship.y = canvas.height;
            if (ship.y > canvas.height) ship.y = 0;
            
            for (let a of asteroids) a.update();
            
            for (let i = 0; i < bullets.length; i++) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                bullets[i].life--;
                if (bullets[i].life <= 0 || bullets[i].x < -50 || bullets[i].x > canvas.width + 50 ||
                    bullets[i].y < -50 || bullets[i].y > canvas.height + 50) {
                    bullets.splice(i, 1);
                    i--;
                }
            }
            
            for (let i = 0; i < particles.length; i++) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            
            checkCollisions();
            
            if (asteroids.length === 0) {
                spawnAsteroids();
            }
            
            // Render
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();
            for (let p of particles) p.draw();
            for (let a of asteroids) a.draw();
            drawBullets();
            drawShip();
        }

        function gameLoop() {
            if (!gameRunning) return;
            updateGame();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (animationId) cancelAnimationFrame(animationId);
            initGame();
            gameRunning = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            startGame();
        }

        // Eventos Teclado
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') { keyLeft = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { keyRight = true; e.preventDefault(); }
            if (e.key === 'ArrowUp') { keyUp = true; e.preventDefault(); }
            if (e.key === ' ') { shoot(); e.preventDefault(); }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keyLeft = false;
            if (e.key === 'ArrowRight') keyRight = false;
            if (e.key === 'ArrowUp') keyUp = false;
        });

        // Eventos Touch
        document.getElementById('rotateLeftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; });
        document.getElementById('rotateLeftBtn').addEventListener('touchend', () => { touchLeft = false; });
        document.getElementById('rotateLeftBtn').addEventListener('mousedown', () => { touchLeft = true; });
        document.getElementById('rotateLeftBtn').addEventListener('mouseup', () => { touchLeft = false; });

        document.getElementById('rotateRightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; });
        document.getElementById('rotateRightBtn').addEventListener('touchend', () => { touchRight = false; });
        document.getElementById('rotateRightBtn').addEventListener('mousedown', () => { touchRight = true; });
        document.getElementById('rotateRightBtn').addEventListener('mouseup', () => { touchRight = false; });

        document.getElementById('accelerateBtn').addEventListener('touchstart', (e) => { e.preventDefault(); touchAccel = true; });
        document.getElementById('accelerateBtn').addEventListener('touchend', () => { touchAccel = false; });
        document.getElementById('accelerateBtn').addEventListener('mousedown', () => { touchAccel = true; });
        document.getElementById('accelerateBtn').addEventListener('mouseup', () => { touchAccel = false; });

        document.getElementById('shootBtn').addEventListener('click', () => shoot());
        document.getElementById('shootBtn').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        document.getElementById('restartTouchBtn').addEventListener('click', () => restartGame());

        canvas.addEventListener('touchstart', (e) => e.preventDefault());
        
        // Redimensionar canvas
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth - 40, 900);
            canvas.style.width = `${maxW}px`;
            canvas.style.height = 'auto';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.startGame = startGame;
        window.restartGame = restartGame;
    </script>
</body>
</html>
