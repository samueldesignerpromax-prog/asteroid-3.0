<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asteroids Neon - Jogo Espacial</title>
    <link rel="stylesheet" href="asteroid.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Tela Inicial -->
    <div id="startScreen" class="overlay">
        <div class="overlay-box">
            <h1>⚡ ASTEROIDS NEON ⚡</h1>
            <p style="color: #00d4ff; margin-bottom: 20px;">Destrua os asteroides e sobreviva!</p>
            <button onclick="startGame()">🚀 INICIAR JOGO</button>
            <div class="controls-info">
                <span>💻 PC: ← → ↑ + ESPAÇO</span>
                <span>📱 CELULAR: BOTÕES NA TELA</span>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameOverScreen" class="overlay" style="display: none;">
        <div class="overlay-box">
            <h1 style="color: #ff0066;">💀 GAME OVER 💀</h1>
            <p style="font-size: 32px; margin: 20px; color: #ffcc00;" id="finalScore">0</p>
            <p>Nível: <strong id="finalLevel">1</strong></p>
            <button onclick="restartGame()">🔄 JOGAR NOVAMENTE</button>
        </div>
    </div>

    <div class="game-container">
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">🎯 PONTOS</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">⭐ NÍVEL</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">❤️ VIDAS</div>
                <div class="info-value lives" id="livesDisplay">❤️ ❤️ ❤️</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="900" height="600"></canvas>

        <!-- Botões Touch para Celular -->
        <div class="touch-controls">
            <div class="touch-btn" id="rotateLeftBtn">◀</div>
            <div class="touch-btn" id="rotateRightBtn">▶</div>
            <div class="touch-btn" id="accelerateBtn">▲</div>
            <div class="touch-btn shoot-btn" id="shootBtn">💥</div>
            <div class="touch-btn restart-btn" id="restartTouchBtn">🔄</div>
        </div>
    </div>

    <script src="asteroid.js"></script>
</body>
</html>
